name: Ziekenhuis Nieuwsfeed Sync

on:
  schedule:
    # Elke dag om 07:00 UTC (08:00 of 09:00 Nederlandse tijd)
    - cron: '0 7 * * *'
  workflow_dispatch: # Handmatige trigger mogelijk maken

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nodig om data.json terug te kunnen pushen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Sync and Process
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Maak .tmp aan indien niet aanwezig
          mkdir -p .tmp
          python sync_all.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend-design/data.json sync.log
          git add -f .tmp/newsfeed.db
          git commit -m "Automated update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend-design
